<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      font-family: "Public Sans", system-ui, sans-serif;
      background: #111111;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
      overflow: hidden;
    }
    .wordmark {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 40px;
    }
    .wordmark-main {
      font-weight: 900;
      font-size: 64px;
      letter-spacing: -0.035em;
      text-transform: uppercase;
      line-height: 1;
    }
    .wordmark-accent {
      font-weight: 700;
      font-size: 48px;
      color: #5eb6b9;
      letter-spacing: 0.01em;
    }
    .tagline {
      font-weight: 400;
      font-size: 32px;
      line-height: 1.4;
      color: #d4d2cc;
      max-width: 900px;
    }
    .url {
      margin-top: auto;
      font-weight: 700;
      font-size: 22px;
      color: #5eb6b9;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="wordmark">
    <span class="wordmark-main">Tenant Triage</span>
    <span class="wordmark-accent">NYC</span>
  </div>
  <p class="tagline">Free, step-by-step guides to taking action on housing problems in New York City.</p>
  <span class="url">tenanttriage.nyc</span>
</body>
</html>
